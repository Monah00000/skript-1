<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/fontello.css">
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inspiration&display=swap" rel="stylesheet">

    <title>Heronwater Концерт</title>
</head>

<body>
    <header class="main-header">
        <div class="container">
            <div class="row">
                <div class="col-12 ">


                    <h1 class="text-white text text-center concert-title">Heronwater Concert</h1>


                    <div class="itd_play" data-bs-toggle="modal" data-bs-target="#exampleModal">
                        <div class="text-center text-white " style="font-size: 20px;">
                            Смотреть Концерт
                        </div>
                    </div>


                    <div class=" text-uppercase text-start text-dd" style="font-size: 40px; ">
                        <p class="text-start text-white">Our minds need</p>
                        <p class="text-start text-white">music as much as</p>

                        <p class="text-start text-red">our souls need love</p>
                    </div>


                </div>
            </div>
        </div>
    </header>

    <footer id="footer">

    </footer>


    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Запись с концерта </h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class='embed-container'><iframe src='https://www.youtube.com/embed/3EDf52oVLA8' frameborder='0'
                            allowfullscreen></iframe></div>
                </div>

            </div>
        </div>
    </div>


    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
